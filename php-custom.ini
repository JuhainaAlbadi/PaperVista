; Custom PHP configuration for PaperVista
; Place this in your PHP conf.d directory or merge with php.ini

; Memory limit for large PDF processing
memory_limit = 1024M

; Maximum execution time for large file processing
max_execution_time = 300
max_input_time = 300

; File upload limits
upload_max_filesize = 100M
post_max_size = 100M

; Error reporting (adjust for production)
display_errors = Off
log_errors = On
error_log = /path/to/php-error.log

; Session settings
session.gc_maxlifetime = 3600

; Other performance settings
output_buffering = 4096
realpath_cache_size = 4096K
realpath_cache_ttl = 600
